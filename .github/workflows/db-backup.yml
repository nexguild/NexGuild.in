name: Database Backup

on:
  schedule:
    - cron: '30 20 * * *'  # 02:00 AM IST = 20:30 UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI or API

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump and compress database
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-acl --clean --if-exists \
            | gzip > backup.sql.gz

      - name: Upload to Google Drive via Apps Script
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SHARED_SECRET }}
        run: |
          FILENAME="nexguild-$(date -u +%Y-%m-%d-%H%M).sql.gz"
          CONTENT=$(base64 -w 0 backup.sql.gz)
          jq -n \
            --arg action "backup_db" \
            --arg _secret "$APPS_SCRIPT_SECRET" \
            --arg filename "$FILENAME" \
            --arg content "$CONTENT" \
            '{action: $action, _secret: $_secret, filename: $filename, content: $content}' \
            > payload.json
          curl -sf --max-time 120 \
            -X POST "$APPS_SCRIPT_URL" \
            -H "Content-Type: application/json" \
            -d @payload.json

      - name: Send success email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          jq -n \
            --arg from "NexGuild Backup <noreply@nexguild.in>" \
            --arg to "admin@nexguild.in" \
            --arg subject "[NexGuild] Database backup succeeded" \
            --arg html "<p>Your NexGuild database backup completed successfully at $TIMESTAMP.</p><p>Files older than 7 days have been auto-deleted from Google Drive.</p>" \
            '{from: $from, to: [$to], subject: $subject, html: $html}' \
            | curl -sf -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d @-

      - name: Send failure email
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          jq -n \
            --arg from "NexGuild Backup <noreply@nexguild.in>" \
            --arg to "admin@nexguild.in" \
            --arg subject "[NexGuild] Database backup FAILED" \
            --arg html "<p><strong>Database backup failed</strong> at $TIMESTAMP.</p><p>Check the GitHub Actions logs: https://github.com/somen2k0/NexGuild.in/actions/workflows/db-backup.yml</p>" \
            '{from: $from, to: [$to], subject: $subject, html: $html}' \
            | curl -sf -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d @-
